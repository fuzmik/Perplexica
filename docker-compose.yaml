name: perplexica
services:
  perplexica-backend:
    container_name: perp-backend
    hostname: perp-backend
    image: rqi14/perplexica-backend:slim
    ports:
      - 3001:3001
    volumes:
      - ./backend-dbstore:/home/perplexica/data
      - ./config.toml:/home/perplexica/config.toml
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - default
    restart: unless-stopped

  perplexica-frontend:
    container_name: perp-frontend
    hostname: perplexica
    build:
      context: .
      dockerfile: app.dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://perp-backend.docker.lan:3001/api
        - NEXT_PUBLIC_WS_URL=ws://perp-backend.docker.lan:3001
    depends_on:
      - perplexica-backend
    ports:
      - 3000:3000
    networks:
      - default
    restart: unless-stopped

networks:
  default:
    name: cosmos-perplexica_default
